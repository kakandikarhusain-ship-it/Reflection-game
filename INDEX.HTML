<!DOCTYPE html>
<html>
<head>
<title>Reaction Speed Game</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins', sans-serif;
text-align:center;
margin-top:100px;
background:royalblue;
color:white;
}

h2{
font-size:32px;
letter-spacing:1px;
}

#box{
width:220px;
height:220px;
background:red;
color:white;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
font-size:20px;
cursor:pointer;
border-radius:20px;
box-shadow:0px 8px 20px rgba(0,0,0,0.3);
transition:0.2s;
}

button{
padding:12px 25px;
font-size:18px;
margin-top:25px;
border:none;
border-radius:10px;
background:#00e676;
color:black;
font-weight:600;
cursor:pointer;
box-shadow:0px 5px 10px rgba(0,0,0,0.3);
}

button:hover{
transform:scale(1.05);
}

#result{
font-size:22px;
margin-top:25px;
font-weight:600;
}

</style>
</head>

<body>

<h2>⚡ Reaction Speed Game</h2>

<div id="box">Wait for Green Light</div>

<br>
<button onclick="startGame()">Start Game</button>

<p id="result"></p>

<script>

let startTime;

function startGame(){

document.getElementById("result").innerHTML="";
document.getElementById("box").style.background="red";
document.getElementById("box").innerHTML="Wait for Green Light";

let delay=Math.random()*3000+2000;

setTimeout(function(){

document.getElementById("box").style.background="limegreen";
document.getElementById("box").innerHTML="TAP NOW!";
startTime=new Date().getTime();

},delay);
}

document.getElementById("box").onclick=function(){

if(this.style.background=="limegreen"){

let endTime=new Date().getTime();
let reaction=endTime-startTime;

document.getElementById("result").innerHTML=
"⚡ Your Reaction Time: "+reaction+" ms ("+(reaction/1000).toFixed(3)+" sec)";
}

}

</script>

</body>
</html>
